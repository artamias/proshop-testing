version: '3.8'

services:

# MONGODB
  mongodb-proshopv2:
    image: mongo:latest
    container_name: mongodb-proshopv2
    volumes:
      - mongo-data:/data/db
    expose:
      - 27017
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

# BACKEND
  backend-proshopv2-1:
    image: proshopv2-backend:v5
    container_name: backend-proshopv2-1
    expose:
      - 5000
    environment:
      - PORT=${PORT}
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb-proshopv2

  backend-proshopv2-2:
    image: proshopv2-backend:v5
    container_name: backend-proshopv2-2
    expose:
      - 5000
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb-proshopv2

# FRONTEND
  frontend-proshopv2:
    image: proshopv2-frontend:v4
    container_name: frontend-proshopv2-1
    expose:
      - 3000

# NGINX
  nginx:
    image: nginx:latest
    container_name: nginx-proshopv2
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend-proshopv2-1
      - backend-proshopv2-2
      - frontend-proshopv2

volumes:
  mongo-data: